{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentinelGate</title>

  <!-- Fonts: self-hosted Inter + JetBrains Mono (no external dependencies) -->
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url(/admin/static/fonts/inter-latin.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 400 500;
      font-display: swap;
      src: url(/admin/static/fonts/jetbrains-mono-latin.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
  </style>

  <link rel="icon" type="image/png" href="/admin/static/img/favicon.png">

  <!-- Design system CSS -->
  <link rel="stylesheet" href="/admin/static/css/variables.css">
  <link rel="stylesheet" href="/admin/static/css/base.css">
  <link rel="stylesheet" href="/admin/static/css/components.css">

  <style>
    /* ── Sidebar ─────────────────────────────────────────────────────── */

    .sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      background-color: var(--bg-primary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: var(--z-sidebar);
      position: relative;
    }

    /* ── Logo ─────────────────────────────────────────────────────────── */

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-5) var(--space-4);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-logo svg {
      width: 24px;
      height: 24px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .sidebar-logo span {
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Search trigger ──────────────────────────────────────────────── */

    .sidebar-search {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin: var(--space-2) var(--space-2) 0;
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text-muted);
      font-size: var(--text-sm);
      transition: border-color 0.15s, background 0.15s;
    }
    .sidebar-search:hover {
      border-color: var(--accent);
      background: var(--bg-secondary);
    }
    .sidebar-search kbd {
      margin-left: auto;
      font-size: var(--text-xs);
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-secondary);
      font-family: var(--font-mono);
    }

    /* ── Navigation ──────────────────────────────────────────────────── */

    .sidebar-nav {
      flex: 1;
      padding: var(--space-3) var(--space-2);
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      text-decoration: none;
      transition: all var(--transition-fast);
      position: relative;
      margin-bottom: 2px;
      cursor: pointer;
      user-select: none;
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      transition: color var(--transition-fast);
    }

    .nav-item:hover {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background-color: var(--accent-subtle);
      color: var(--accent-text);
    }

    .nav-item.active svg {
      color: var(--accent);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background-color: var(--accent);
      border-radius: 0 var(--radius-full) var(--radius-full) 0;
    }

    .nav-separator {
      height: 1px;
      background: var(--border);
      margin: var(--space-2) var(--space-3);
      opacity: 0.5;
    }

    /* ── Footer ──────────────────────────────────────────────────────── */

    .sidebar-footer {
      padding: var(--space-4);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-version {
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-bottom: var(--space-1);
    }

    .sidebar-upstream-count {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }

    /* ── Toast container ─────────────────────────────────────────────── */

    .toast-container {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: var(--z-toast);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      pointer-events: none;
    }

    .toast-container > * {
      pointer-events: auto;
    }

    /* ── Responsive: Tablet — Icon-Only Sidebar ──────────────────────── */

    @media (max-width: 1024px) and (min-width: 769px) {
      .sidebar {
        width: 64px;
      }

      .nav-item {
        font-size: 0;
        justify-content: center;
        padding: var(--space-2);
      }

      .nav-item svg {
        width: 18px;
        height: 18px;
      }

      .sidebar-logo span,
      .sidebar-version,
      .sidebar-upstream-count {
        display: none;
      }

      .sidebar-logo {
        justify-content: center;
        padding: var(--space-3);
      }
    }

    /* ── Responsive: Mobile Bottom Tab Bar ────────────────────────────── */

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        width: 100%;
        height: auto;
        flex-direction: row;
        border-right: none;
        border-top: 1px solid var(--border);
        z-index: var(--z-sidebar);
        background: var(--bg-primary);
      }

      .sidebar-logo,
      .sidebar-search,
      .sidebar-footer,
      .nav-separator {
        display: none;
      }

      .sidebar-nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-around;
        padding: 0;
        overflow: visible;
        flex: 1;
      }

      .nav-item {
        display: none;
        margin: 0;
        padding: var(--space-2);
        flex-direction: column;
        gap: 2px;
        font-size: 10px;
        border-left: none;
        border-radius: 0;
        min-width: 44px;
        min-height: 44px;
        align-items: center;
        justify-content: center;
      }

      .nav-item[data-page="dashboard"],
      .nav-item[data-page="tools"],
      .nav-item[data-page="notifications"],
      .nav-item[data-page="access"] {
        display: flex;
      }

      .nav-item.active {
        background: transparent;
        color: var(--accent);
      }

      .nav-item.active::before {
        display: none;
      }

      .nav-item.active svg {
        color: var(--accent);
      }

      .nav-item.active::after {
        content: '';
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--accent);
        margin-top: 2px;
      }

      .main-content {
        padding: var(--space-4);
        padding-bottom: calc(var(--space-4) + 64px);
      }

      .app-layout {
        flex-direction: column;
      }

      .btn,
      .nav-item,
      button,
      a,
      .form-select,
      .table-checkbox {
        min-height: 44px;
        min-width: 44px;
      }

      .btn-sm {
        min-height: 36px;
        min-width: 36px;
      }
    }

    /* ── Responsive: Small Phone — Single Column Stat Cards ───────── */

    @media (max-width: 480px) {
      .stat-cards-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>
  <a href="#page-content" class="skip-to-content">Skip to content</a>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>SentinelGate</span>
      </div>

      <div class="sidebar-search" id="sidebar-search-trigger" title="Search (⌘K)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Search...</span>
        <kbd>⌘K</kbd>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#/dashboard" data-page="dashboard" class="nav-item active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Dashboard
        </a>

        <a href="#/tools" data-page="tools" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          Tools &amp; Rules
        </a>

        <a href="#/access" data-page="access" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
          Connections
        </a>

        <a href="#/audit" data-page="audit" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="16" y2="17"/>
            <line x1="8" y1="9" x2="12" y2="9"/>
          </svg>
          Activity
        </a>

        <div class="nav-separator"></div>

        <a href="#/getting-started" data-page="getting-started" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
          </svg>
          Getting Started
        </a>

        <a href="#/sessions" data-page="sessions" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
          </svg>
          Sessions
        </a>

        <a href="#/notifications" data-page="notifications" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          Notifications
        </a>

        <a href="#/security" data-page="security" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          Security
        </a>

        <a href="#/compliance" data-page="compliance" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          </svg>
          Compliance
        </a>

        <a href="#/permissions" data-page="permissions" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
          </svg>
          Access Review
        </a>

        <a href="#/finops" data-page="finops" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Cost Tracking
        </a>

        <a href="#/redteam" data-page="redteam" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Red Team
        </a>

        <a href="#/agents" data-page="agents" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Agents
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-version">v{{.Version}}</div>
        <div class="sidebar-upstream-count" id="upstream-count">0 servers</div>
      </div>

    </aside>

    <!-- Main content area (populated by JS router) -->
    <main class="main-content" id="page-content"></main>

  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Application scripts (order matters) -->
  <script src="/admin/static/js/icons.js"></script>
  <script src="/admin/static/js/api.js"></script>
  <script src="/admin/static/js/toast.js"></script>
  <script src="/admin/static/js/modal.js"></script>
  <script src="/admin/static/js/router.js"></script>
  <script src="/admin/static/js/help.js"></script>
  <script src="/admin/static/js/clipboard.js"></script>
  <script src="/admin/static/js/sounds.js"></script>
  <script src="/admin/static/js/pages/dashboard.js"></script>
  <script src="/admin/static/js/pages/tools.js"></script>
  <script src="/admin/static/js/pages/access.js"></script>
  <script src="/admin/static/js/pages/audit.js"></script>
  <script src="/admin/static/js/pages/notifications.js"></script>
  <script src="/admin/static/js/pages/security.js"></script>
  <script src="/admin/static/js/pages/onboarding.js"></script>
  <script src="/admin/static/js/pages/getting_started.js"></script>
  <script src="/admin/static/js/pages/compliance.js"></script>
  <script src="/admin/static/js/pages/permissions.js"></script>
  <script src="/admin/static/js/pages/agents.js"></script>
  <script src="/admin/static/js/pages/redteam.js"></script>
  <script src="/admin/static/js/pages/finops.js"></script>
  <script src="/admin/static/js/pages/sessions.js"></script>
  <script src="/admin/static/js/favicon.js"></script>
  <script src="/admin/static/js/keyboard.js"></script>
  <script src="/admin/static/js/command-palette.js"></script>
  <script src="/admin/static/js/app.js"></script>
</body>
</html>
{{end}}
